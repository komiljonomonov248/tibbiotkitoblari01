<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitoblar Ro'yxati</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-[#0f172a] text-white p-6">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-center text-sky-400">Tibbiyot Kutubxonasi</h1>
        
        <div id="bookList" class="space-y-4">
            <p class="text-center text-slate-500">Kitoblar yuklanmoqda...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClT6pzoVoSSqSuqMHhxsh0gEAyEET-qw",
            authDomain: "tibbiyot-52bbe.firebaseapp.com",
            projectId: "tibbiyot-52bbe",
            databaseURL: "https://tibbiyot-52bbe-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);

        const bookList = document.getElementById('bookList');

        // Bazadan kitoblarni o'qish
        firebase.database().ref('library').on('value', (snapshot) => {
            const data = snapshot.val();
            bookList.innerHTML = '';

            if(!data) {
                bookList.innerHTML = '<p class="text-center text-slate-400">Hozircha kitoblar yo'q.</p>';
                return;
            }

            for(let id in data) {
                const book = data[id];
                bookList.innerHTML += `
                    <div class="bg-slate-800 p-5 rounded-2xl flex justify-between items-center border border-slate-700 shadow-xl">
                        <div>
                            <h3 class="text-xl font-bold">${book.title}</h3>
                            <p class="text-slate-400 text-sm">Hajmi: 200MB+ | PDF</p>
                        </div>
                        <a href="${book.fileUrl}" target="_blank" class="bg-sky-500 hover:bg-sky-600 px-6 py-2 rounded-xl font-bold transition shadow-lg">O'qish</a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
