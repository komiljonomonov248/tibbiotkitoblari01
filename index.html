<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibbiyot Kitoblari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; scroll-behavior: smooth; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <h2 class="text-2xl font-bold">Tibbiyot Kitoblari</h2>
        <div class="hidden md:flex space-x-6 items-center">
            <a href="#" class="hover:text-sky-400">Asosiy</a>
            <a href="#registration" class="bg-sky-500 px-4 py-2 rounded-lg font-bold hover:bg-sky-600 transition">Kirish</a>
        </div>
        <div class="md:hidden">
            <a href="#registration" class="bg-sky-500 px-3 py-1 rounded text-sm text-white">Kirish</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center text-center px-4 py-20">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6">Tibbiyot olamiga <span class="text-sky-500">xush kelibsiz</span></h1>
        <p class="text-slate-400 text-xl max-w-2xl mb-8">Bu yerda tibbiyotga oid eng sara kitoblarni topishingiz mumkin.</p>
        <div class="flex space-x-4">
            <a href="#registration" class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-slate-200 transition">Boshlash</a>
        </div>
    </main>

    <section id="registration" style="padding: 80px 20px; background-color: #1e293b; text-align: center;">
        <h2 class="text-3xl font-bold mb-4">Ro'yxatdan o'tish</h2>
        <p class="mb-8 text-slate-400">Tizimga kirish uchun ma'lumotlaringizni kiriting:</p>
        
        <form action="#" style="display: inline-block; text-align: left; background: #334155; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px;">
            <label>Ism va Familiya:</label><br>
            <input type="text" placeholder="Ismingizni yozing" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; color: black;"><br>
            
            <label>Elektron pochta:</label><br>
            <input type="email" placeholder="Emailingizni yozing" style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; color: black;"><br>
            
            <button type="submit" style="background-color: #0ea5e9; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px;">
                Yuborish
            </button>
        </form>
    </section>

    <footer class="p-8 border-t border-slate-800 text-center text-slate-500">
        &copy; 2024 Tibbiyot Kitoblari. Barcha huquqlar himoyalangan.
    </footer>

</body>
</html>
