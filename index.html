<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibbiyot Kitoblari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        #authModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; align-items: center; justify-content: center; }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { border-bottom: 4px solid #38bdf8; color: #38bdf8; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0f172a] sticky top-0 z-50">
        <h2 class="text-2xl font-bold gradient-text">Tibbiyot Kitoblari</h2>
        <div>
            <button onclick="openModal('login')" class="text-slate-300 mr-4 font-bold hover:text-white">Kirish</button>
            <button onclick="openModal('register')" class="bg-sky-500 px-5 py-2 rounded-lg font-bold hover:bg-sky-600 transition shadow-lg">Ro'yxatdan o'tish</button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center text-center px-4 py-20">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">Tibbiyot <span class="gradient-text">olamiga</span> <br> xush kelibsiz</h1>
        <p class="text-slate-400 text-xl max-w-2xl mb-10">Barcha qurilmalardan shaxsiy profilingiz orqali xavfsiz kiring.</p>
        <button onclick="openModal('register')" class="bg-white text-black px-10 py-4 rounded-full font-bold text-lg hover:bg-slate-200 transition shadow-2xl transform hover:scale-105">Hoziroq boshlash</button>
    </main>

    <div id="authModal">
        <div class="bg-white text-black p-8 rounded-2xl w-full max-w-md shadow-2xl relative mx-4">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black text-2xl">&times;</button>
            
            <div class="flex justify-around mb-8 border-b">
                <button id="tabLogin" onclick="switchTab('login')" class="pb-2 font-bold transition">Kirish</button>
                <button id="tabRegister" onclick="switchTab('register')" class="pb-2 font-bold transition tab-active">Ro'yxatdan o'tish</button>
            </div>

            <form onsubmit="handleAuth(event)">
                <div id="nameField" class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-700">Ism va Familiya</label>
                    <input type="text" id="authName" placeholder="Ismingizni kiriting" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-sky-500 focus:outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-700">Elektron pochta</label>
                    <input type="email" id="authEmail" required placeholder="Emailingizni kiriting" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-sky-500 focus:outline-none">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-1 text-gray-700">Maxfiy parol (Kod)</label>
                    <input type="password" id="authPass" required placeholder="Parolingizni kiriting" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-sky-500 focus:outline-none">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-sky-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-sky-600 transition shadow-lg">Davom etish</button>
            </form>
        </div>
    </div>

    <script>
        // FIREBASE SOZLAMALARI (Rasm 1000053014.jpg asosida)
        const firebaseConfig = {
            apiKey: "AIzaSyClT6pzoVoSSqSuqMHhxsh0gEAyEET-qw",
            authDomain: "tibbiyot-52bbe.firebaseapp.com",
            projectId: "tibbiyot-52bbe",
            storageBucket: "tibbiyot-52bbe.appspot.com",
            messagingSenderId: "862570235406",
            appId: "1:862570235406:web:9f80848e59de858790de5f",
            measurementId: "G-EBXD14ZUXC",
            databaseURL: "https://tibbiyot-52bbe-default-rtdb.firebaseio.com" // MA'LUMOTLAR BAZASI MANZILI
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentMode = 'register';

        // Avval kirgan bo'lsa, to'g'ri kitoblar sahifasiga o'tadi
        window.onload = function() {
            if (localStorage.getItem('user_name')) {
                window.location.href = 'books.html';
            }
        };

        function openModal(mode) {
            document.getElementById('authModal').style.display = 'flex';
            switchTab(mode);
        }

        function closeModal() { document.getElementById('authModal').style.display = 'none'; }

        function switchTab(mode) {
            currentMode = mode;
            document.getElementById('nameField').style.display = mode === 'login' ? 'none' : 'block';
            document.getElementById('authName').required = (mode === 'register');
            document.getElementById('tabLogin').className = mode === 'login' ? 'pb-2 font-bold tab-active text-sky-500' : 'pb-2 font-bold text-gray-400';
            document.getElementById('tabRegister').className = mode === 'register' ? 'pb-2 font-bold tab-active text-sky-500' : 'pb-2 font-bold text-gray-400';
            document.getElementById('submitBtn').innerText = mode === 'login' ? 'Tizimga kirish' : 'Ro\'yxatdan o\'tish';
        }

        function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('authEmail').value.replace(/\./g, ','); // Firebase nuqtani qabul qilmaydi
            const pass = document.getElementById('authPass').value;
            const name = document.getElementById('authName').value;

            if (currentMode === 'register') {
                // Ma'lumotlarni Firebase'ga saqlash
                db.ref('users/' + email).set({
                    username: name,
                    password: pass
                }).then(() => {
                    localStorage.setItem('user_name', name);
                    alert("Ro'yxatdan o'tish muvaffaqiyatli!");
                    window.location.href = 'books.html';
                }).catch(err => alert("Xatolik yuz berdi: " + err.message));
            } else {
                // Bazadan parolni tekshirish
                db.ref('users/' + email).once('value').then((snapshot) => {
                    const userData = snapshot.val();
                    if (userData && userData.password === pass) {
                        localStorage.setItem('user_name', userData.username);
                        window.location.href = 'books.html';
                    } else {
                        alert("Email yoki parol noto'g'ri!");
                    }
                }).catch(err => alert("Xatolik: " + err.message));
            }
        }
    </script>
</body>
</html>
