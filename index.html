<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibbiyot Kitoblari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; }
        /* Modal (Oyna) stili */
        #loginModal {
            display: none; /* Boshida ko'rinmaydi */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 999;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center">
        <h2 class="text-2xl font-bold">Tibbiyot Kitoblari</h2>
        <button onclick="toggleModal()" class="bg-sky-500 px-6 py-2 rounded-lg font-bold hover:bg-sky-600 transition">Kirish</button>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center text-center px-4">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 text-white">Tibbiyot olamiga <span class="text-sky-400">xush kelibsiz</span></h1>
        <p class="text-slate-400 text-xl max-w-2xl mb-8">Bu yerda barcha tibbiy kitoblarning PDF formatini topasiz.</p>
        <button onclick="toggleModal()" class="bg-white text-black px-10 py-4 rounded-full font-bold text-lg hover:bg-slate-200 transition shadow-lg">Boshlash</button>
    </main>

    <div id="loginModal">
        <div class="bg-white text-black p-8 rounded-2xl w-full max-w-md shadow-2xl relative">
            <button onclick="toggleModal()" class="absolute top-4 right-4 text-gray-500 hover:text-black text-2xl">&times;</button>
            <h2 class="text-2xl font-bold mb-6 text-center">Ro'yxatdan o'tish</h2>
            
            <form action="#">
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-2">Ism va Familiya</label>
                    <input type="text" placeholder="Ismingizni kiriting" class="w-full border p-3 rounded-lg focus:outline-sky-500">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-2">Elektron pochta</label>
                    <input type="email" placeholder="Emailingizni kiriting" class="w-full border p-3 rounded-lg focus:outline-sky-500">
                </div>
                <button type="submit" class="w-full bg-sky-500 text-white py-3 rounded-lg font-bold hover:bg-sky-600 transition">
                    Davom etish
                </button>
            </form>
        </div>
    </div>

    <footer class="p-8 border-t border-slate-800 text-center text-slate-500">
        &copy; 2026 Tibbiyot Kitoblari. Barcha huquqlar himoyalangan.
    </footer>

    <script>
        function toggleModal() {
            const modal = document.getElementById('loginModal');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                modal.style.display = 'flex';
            }
        }
    </script>

</body>
</html>
