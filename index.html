<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibbiyot Kutubxonasi - Kirish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-sky-400">Xush kelibsiz</h1>
            <p class="text-slate-400 mt-2">Kutubxonadan foydalanish uchun tizimga kiring</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 ml-1 text-slate-300">Email manzilingiz</label>
                <input type="email" id="email" placeholder="misol@mail.com" 
                       class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl focus:border-sky-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1 ml-1 text-slate-300">Parolingiz</label>
                <input type="password" id="password" placeholder="••••••••" 
                       class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl focus:border-sky-500 outline-none transition">
            </div>
            
            <div class="flex gap-4 pt-4">
                <button onclick="login()" id="loginBtn" 
                        class="flex-1 bg-sky-600 hover:bg-sky-700 text-white py-3 rounded-xl font-bold transition active:scale-95">
                    Kirish
                </button>
                <button onclick="register()" id="regBtn" 
                        class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-3 rounded-xl font-bold transition active:scale-95">
                    Ro'yxatdan o'tish
                </button>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="admin.html" class="text-slate-500 text-sm hover:text-sky-400 transition italic">Admin panelga o'tish</a>
        </div>
    </div>

    <script>
        // FIREBASE SOZLAMALARI
        const firebaseConfig = {
            apiKey: "AIzaSyClT6pzoVoSSqSuqMHhxsh0gEAyEET-qw",
            authDomain: "tibbiyot-52bbe.firebaseapp.com",
            projectId: "tibbiyot-52bbe",
            databaseURL: "https://tibbiyot-52bbe-default-rtdb.firebaseio.com"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        // KIRISH FUNKSIYASI
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                Swal.fire({ icon: 'warning', title: 'Diqqat!', text: 'Email va parolni kiriting', background: '#1e293b', color: '#fff' });
                return;
            }

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then(() => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Muvaffaqiyatli!',
                        text: 'Tizimga kirdingiz',
                        showConfirmButton: false,
                        timer: 1500,
                        background: '#1e293b',
                        color: '#fff'
                    }).then(() => {
                        window.location.href = "books.html";
                    });
                })
                .catch((error) => {
                    Swal.fire({ icon: 'error', title: 'Xatolik!', text: "Email yoki parol noto'g'ri", background: '#1e293b', color: '#fff' });
                });
        }

        // RO'YXATDAN O'TISH FUNKSIYASI
        function register() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) {
                Swal.fire({ icon: 'warning', title: 'Diqqat!', text: 'Ma’lumotlarni to‘ldiring', background: '#1e293b', color: '#fff' });
                return;
            }

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then(() => {
                    Swal.fire({
                        icon: 'success',
                        title: 'Tabriklaymiz!',
                        text: 'Siz muvaffaqiyatli ro‘yxatdan o‘tdingiz',
                        confirmButtonText: 'Kutubxonaga kirish',
                        confirmButtonColor: '#0ea5e9',
                        background: '#1e293b',
                        color: '#fff'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            window.location.href = "books.html";
                        }
                    });
                })
                .catch((error) => {
                    Swal.fire({ icon: 'error', title: 'Xato!', text: "Email allaqachon mavjud yoki parol juda qisqa", background: '#1e293b', color: '#fff' });
                });
        }
    </script>
</body>
</html>
