<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibbiyot Kitoblari</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; scroll-behavior: smooth; }
        #authModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 999; align-items: center; justify-content: center; }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { border-bottom: 3px solid #38bdf8; color: #38bdf8; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <nav class="p-6 border-b border-slate-800 flex justify-between items-center bg-[#0f172a] sticky top-0 z-50">
        <h2 class="text-2xl font-bold gradient-text">Tibbiyot Kitoblari</h2>
        <div id="navAuthSection">
            <button onclick="openModal('login')" class="text-slate-300 mr-4 font-bold hover:text-white">Kirish</button>
            <button onclick="openModal('register')" class="bg-sky-500 px-5 py-2 rounded-lg font-bold hover:bg-sky-600 transition">Ro'yxatdan o'tish</button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center text-center px-4 py-20">
        <h1 class="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">Tibbiyot <span class="gradient-text">olamiga</span> <br> xush kelibsiz</h1>
        <p id="welcomeMsg" class="text-slate-400 text-xl max-w-2xl mb-10">Shaxsiy parolingiz orqali xavfsiz kiring.</p>
        <button id="heroBtn" onclick="openModal('register')" class="bg-white text-black px-10 py-4 rounded-full font-bold text-lg hover:bg-slate-200 transition shadow-xl">Boshlash</button>
    </main>

    <div id="authModal">
        <div class="bg-white text-black p-8 rounded-2xl w-full max-w-md shadow-2xl relative mx-4">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-black text-2xl">&times;</button>
            
            <div class="flex justify-around mb-8 border-b">
                <button id="tabLogin" onclick="switchTab('login')" class="pb-2 font-bold transition">Kirish</button>
                <button id="tabRegister" onclick="switchTab('register')" class="pb-2 font-bold transition tab-active">Ro'yxatdan o'tish</button>
            </div>

            <form onsubmit="handleAuth(event)">
                <div id="nameField" class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-700">Ism va Familiya</label>
                    <input type="text" id="authName" placeholder="Ismingizni kiriting" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-sky-500 focus:outline-none">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-bold mb-1 text-gray-700">Elektron pochta</label>
                    <input type="email" id="authEmail" required placeholder="Emailingizni kiriting" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-sky-500 focus:outline-none">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold mb-1 text-gray-700">Shaxsiy parol (Kod)</label>
                    <input type="password" id="authPass" required placeholder="Maxfiy kodingizni kiriting" class="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-sky-500 focus:outline-none">
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-sky-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-sky-600 transition shadow-lg">Davom etish</button>
            </form>
        </div>
    </div>

    <footer class="p-8 border-t border-slate-800 text-center text-slate-500">
        <p>&copy; 2026 Instut Kitoblari. Barcha huquqlar himoyalangan.</p>
    </footer>

    <script>
        let currentMode = 'register';

        window.onload = function() {
            if (localStorage.getItem('user_name')) {
                window.location.href = 'books.html';
            }
        };

        function openModal(mode) {
            document.getElementById('authModal').style.display = 'flex';
            switchTab(mode);
        }

        function closeModal() { document.getElementById('authModal').style.display = 'none'; }

        function switchTab(mode) {
            currentMode = mode;
            const nameField = document.getElementById('nameField');
            const submitBtn = document.getElementById('submitBtn');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (mode === 'login') {
                nameField.style.display = 'none';
                document.getElementById('authName').required = false;
                submitBtn.innerText = 'Tizimga kirish';
                tabLogin.classList.add('tab-active');
                tabRegister.classList.remove('tab-active');
            } else {
                nameField.style.display = 'block';
                document.getElementById('authName').required = true;
                submitBtn.innerText = 'Ro\'yxatdan o\'tish';
                tabRegister.classList.add('tab-active');
                tabLogin.classList.remove('tab-active');
            }
        }

        function handleAuth(event) {
            event.preventDefault();
            const name = document.getElementById('authName').value;
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;

            if (currentMode === 'register') {
                // Ma'lumotlarni saqlash (parol bilan birga)
                localStorage.setItem('user_name', name);
                localStorage.setItem('user_email', email);
                localStorage.setItem('user_pass', pass);
                alert("Ro'yxatdan muvaffaqiyatli o'tdingiz! Parolingizni unutmang.");
                window.location.href = 'books.html';
            } else {
                const savedEmail = localStorage.getItem('user_email');
                const savedPass = localStorage.getItem('user_pass');

                // Ham emailni, ham parolni tekshirish
                if (email === savedEmail && pass === savedPass) {
                    window.location.href = 'books.html';
                } else if (email !== savedEmail) {
                    alert("Email topilmadi!");
                } else {
                    alert("Parol noto'g'ri! Qayta urinib ko'ring.");
                }
            }
        }
    </script>
</body>
</html>
