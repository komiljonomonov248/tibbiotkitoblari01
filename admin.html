<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kitob Qo'shish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-slate-900 text-white p-6 flex flex-col items-center min-h-screen">
    <div class="bg-white text-black p-8 rounded-2xl shadow-2xl w-full max-w-md mt-10">
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800">Yangi Kitob Qo'shish</h2>
        
        <div class="mb-4">
            <label class="block text-sm font-bold mb-1 text-gray-700">Kitob nomi</label>
            <input type="text" id="bookTitle" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="Masalan: Dinshunoslik">
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold mb-1 text-gray-700">Google Drive linki</label>
            <input type="url" id="bookUrl" class="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500" placeholder="https://drive.google.com/...">
        </div>

        <button onclick="addBook()" id="addBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">Bazaga Saqlash</button>
        <p id="msg" class="mt-4 text-center font-bold text-green-600"></p>
        <a href="index.html" class="block text-center mt-4 text-gray-500 underline text-sm">Asosiy sahifaga qaytish</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyClT6pzoVoSSqSuqMHhxsh0gEAyEET-qw",
            authDomain: "tibbiyot-52bbe.firebaseapp.com",
            projectId: "tibbiyot-52bbe",
            databaseURL: "https://tibbiyot-52bbe-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);

        function addBook() {
            const title = document.getElementById('bookTitle').value;
            const url = document.getElementById('bookUrl').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('addBtn');

            if(!title || !url) {
                alert("Iltimos, hamma maydonni to'ldiring!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Saqlanmoqda...";

            firebase.database().ref('library').push({
                title: title,
                fileUrl: url
            }).then(() => {
                msg.innerText = "Kitob muvaffaqiyatli qo'shildi!";
                document.getElementById('bookTitle').value = '';
                document.getElementById('bookUrl').value = '';
                btn.disabled = false;
                btn.innerText = "Bazaga Saqlash";
            }).catch(err => {
                alert("Xatolik: " + err.message);
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
