<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kitob Qo'shish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="bg-[#0f172a] text-white flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-white text-black p-8 rounded-3xl shadow-2xl w-full max-w-md border-t-8 border-blue-600">
        <h2 class="text-3xl font-extrabold mb-2 text-center text-slate-800">Admin Panel</h2>
        <p class="text-center text-gray-500 mb-8 italic">Yangi tibbiy kitob qo'shish</p>
        
        <div class="mb-5">
            <label class="block text-sm font-bold mb-2 text-gray-700 ml-1">Kitobning to'liq nomi</label>
            <input type="text" id="bookTitle" placeholder="Masalan: Anatomiya va Fiziologiya" 
                   class="w-full border-2 border-gray-200 p-3 rounded-2xl focus:border-blue-500 outline-none transition-all">
        </div>

        <div class="mb-8">
            <label class="block text-sm font-bold mb-2 text-gray-700 ml-1">Google Drive Linki</label>
            <input type="url" id="bookUrl" placeholder="https://drive.google.com/..." 
                   class="w-full border-2 border-gray-200 p-3 rounded-2xl focus:border-blue-500 outline-none transition-all text-blue-600">
            <p class="text-[10px] text-gray-400 mt-2 ml-1">*Ruxsatni "Anyone with the link" qilishni unutmang!</p>
        </div>

        <button onclick="addBook()" id="addBtn" 
                class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 active:scale-95 transition-all shadow-lg shadow-blue-200">
            Bazaga Saqlash
        </button>

        <p id="msg" class="mt-4 text-center font-bold text-green-600"></p>
        
        <a href="index.html" class="block text-center mt-6 text-gray-400 hover:text-blue-500 transition text-sm">Asosiy sahifaga qaytish</a>
    </div>

    <script>
        // SIZNING FIREBASE SOZLAMALARINGIZ
        const firebaseConfig = {
            apiKey: "AIzaSyClT6pzoVoSSqSuqMHhxsh0gEAyEET-qw",
            authDomain: "tibbiyot-52bbe.firebaseapp.com",
            projectId: "tibbiyot-52bbe",
            databaseURL: "https://tibbiyot-52bbe-default-rtdb.firebaseio.com"
        };
        
        // Firebase-ni ishga tushirish
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        function addBook() {
            const title = document.getElementById('bookTitle').value;
            const url = document.getElementById('bookUrl').value;
            const msg = document.getElementById('msg');
            const btn = document.getElementById('addBtn');

            // Tekshirish
            if(!title || !url) {
                alert("Iltimos, kitob nomi va linkini to'liq kiriting!");
                return;
            }

            // Tugmani vaqtincha o'chirish
            btn.disabled = true;
            btn.innerText = "Saqlanmoqda...";
            btn.classList.replace('bg-blue-600', 'bg-gray-400');

            // Realtime Database-ga 'library' papkasi ostida saqlash
            firebase.database().ref('library').push({
                title: title,
                fileUrl: url,
                date: new Date().toLocaleDateString()
            }).then(() => {
                // Muvaffaqiyatli bo'lsa
                msg.innerText = "✅ Kitob muvaffaqiyatli saqlandi!";
                document.getElementById('bookTitle').value = '';
                document.getElementById('bookUrl').value = '';
                
                // 3 soniyadan keyin xabarni o'chirish
                setTimeout(() => { 
                    msg.innerText = "";
                    btn.disabled = false;
                    btn.innerText = "Bazaga Saqlash";
                    btn.classList.replace('bg-gray-400', 'bg-blue-600');
                }, 3000);

            }).catch(err => {
                alert("Xatolik yuz berdi: " + err.message);
                btn.disabled = false;
                btn.innerText = "Bazaga Saqlash";
            });
        }
    </script>
</body>
</html>
