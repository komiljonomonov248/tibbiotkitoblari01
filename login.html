<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tizimga kirish</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen p-4">
    <div class="bg-white text-black p-8 rounded-2xl w-full max-w-md shadow-2xl">
        <h2 class="text-3xl font-bold mb-2 text-center text-slate-800">Kirish</h2>
        <p class="text-center text-slate-500 mb-8">Ma'lumotlaringizni kiriting</p>
        
        <form action="index.html">
            <div class="mb-4">
                <label class="block text-sm font-bold mb-2 text-slate-700">Ism va Familiya</label>
                <input type="text" required placeholder="Ismingizni kiriting" 
                    class="w-full border-2 border-slate-200 p-3 rounded-xl focus:border-sky-500 focus:outline-none transition">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold mb-2 text-slate-700">Elektron pochta</label>
                <input type="email" required placeholder="Emailingizni kiriting" 
                    class="w-full border-2 border-slate-200 p-3 rounded-xl focus:border-sky-500 focus:outline-none transition">
            </div>
            <button type="submit" class="w-full bg-sky-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-sky-600 transition shadow-lg">
                Kirish
            </button>
        </form>
        
        <div class="mt-6 text-center">
            <a href="index.html" class="text-sky-500 hover:underline text-sm font-medium">Orqaga qaytish</a>
        </div>
    </div>
</body>
</html>
